<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — js.learn</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #1a1a1a;
        --surface: #242424;
        --ink: #ebeae7;
        --primary: #e0954e;
        --border: #383838;
        --mono: 'JetBrains Mono', ui-monospace, 'Cascadia Code', monospace;
        --sans: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--sans);
        padding: 2rem;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        max-width: 28rem;
        text-align: center;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        padding: 3rem 2.5rem;
      }
      .mark {
        font-family: var(--mono);
        font-size: 2.5rem;
        color: var(--primary);
        margin-bottom: 1.5rem;
        letter-spacing: -0.02em;
      }
      .mark .br {
        color: var(--ink);
        opacity: 0.5;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin: 0 0 0.75rem;
        letter-spacing: -0.01em;
      }
      p {
        color: var(--muted, #9a9994);
        line-height: 1.6;
        margin: 0 0 2rem;
        opacity: 0.8;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-family: var(--mono);
        font-size: 0.8rem;
        color: var(--primary);
        margin-bottom: 2rem;
        padding: 0.35rem 0.75rem;
        border: 1px solid var(--border);
        border-radius: 999px;
      }
      .dot {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        background: var(--primary);
      }
      .retry {
        font-family: var(--sans);
        font-size: 0.95rem;
        font-weight: 500;
        color: var(--bg);
        background: var(--primary);
        border: none;
        padding: 0.75rem 1.75rem;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: opacity 0.15s ease;
      }
      .retry:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="mark"><span class="br">{</span> js.learn <span class="br">}</span></div>
      <span class="status"><span class="dot"></span> offline</span>
      <h1>You're offline</h1>
      <p>
        The page you're looking for hasn't been cached yet. Reconnect and try again — anything
        you've already visited will still be available here.
      </p>
      <button class="retry" onclick="location.reload()">Retry connection</button>
    </main>
  </body>
</html>
